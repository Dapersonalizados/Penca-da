const ADMIN_PASS = "da2026";

function calcPuntos(pred, real) {
  if (!real || real.local==="" || real.visitante==="") return null;
  const rl=parseInt(real.local), rv=parseInt(real.visitante);
  const pl=parseInt(pred.local), pv=parseInt(pred.visitante);
  if (isNaN(pl)||isNaN(pv)) return null;
  if (pl===rl && pv===rv) return 3;
  if ((pl>pv&&rl>rv)||(pl<pv&&rl<rv)||(pl===pv&&rl===rv)) return 1;
  return 0;
}

function calcTotal(usuario, resultados, campeonReal) {
  const preds = load(`da_pred_${usuario}`, {});
  let total=0, exactos=0, resultadosOk=0;
  Object.entries(preds).forEach(([id, pred]) => {
    const real = resultados[id];
    const pts = calcPuntos(pred, real);
    if (pts===3){total+=3;exactos++;}
    else if (pts===1){total+=1;resultadosOk++;}
  });
  // Bonus campeón: 5 pts si acertó
  const predCampeon = load(`da_campeon_${usuario}`, "");
  if (campeonReal && predCampeon && predCampeon===campeonReal) total+=5;
  return { total, exactos, resultadosOk };
}

// ── FIREBASE CONFIG ───────────────────────────────────────────────────────────
const FB_URL = "https://penca-da-default-rtdb.firebaseio.com";

async function fbSet(path, data) {
  try {
    await fetch(`${FB_URL}/${path}.json`, {
      method: "PUT",
      body: JSON.stringify(data),
      headers: {"Content-Type": "application/json"}
    });
  } catch(e) { console.error("fbSet error", e); }
}

async function fbGet(path) {
  try {
    const r = await fetch(`${FB_URL}/${path}.json`);
    return await r.json();
  } catch(e) { return null; }
}

async function fbUpdate(path, data) {
  try {
    await fetch(`${FB_URL}/${path}.json`, {
      method: "PATCH",
      body: JSON.stringify(data),
      headers: {"Content-Type": "application/json"}
    });
  } catch(e) { console.error("fbUpdate error", e); }
}

// localStorage fallback
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}

// ── Badge ──────────────────────────────────────────────────────────────────────
function Badge({pts}){
  if(pts===null) return null;
  const cfg = pts===3?{bg:"#00C896",text:"✓ +3"}
    : pts===1?{bg:DA_YELLOW,text:"~+1"}
    : {bg:"#E53E3E",text:"✗"};
  return(
    <span style={{background:cfg.bg,color:"#111",borderRadius:5,padding:"2px 7px",
      fontSize:11,fontWeight:700,marginLeft:4,whiteSpace:"nowrap"}}>
      {cfg.text}
    </span>
  );
}

function Tabla({resultados,campeonReal}){

  const [fbCampeones,setFbCampeones]=useState({});

    (async()=>{
      setLoading(true);
      const u=await fbGet("usuarios");
      const p=await fbGet("predicciones");
      const c=await fbGet("campeones");
      if(u) setUsuarios(Object.values(u));
      if(p) setFbPreds(p);
      if(c) setFbCampeones(c);
      setLoading(false);
    })();
  },[]);

    const msg=`⚽ ¡Te invito a la *Penca Mundial Da!* 🏆\n\n`+

      `🥉 3er premio: Canguro con diseño a elección\n`+

        </div>
      )}

      {loading&&(
        <p style={{color:"rgba(255,255,255,0.4)",textAlign:"center",padding:24}}>
          Cargando participantes...
        </p>
      )}

      {!loading&&rows.length===0&&(

      </div>
    </div>
  );
}

      </div>

      {GRUPOS.map(g=>(
        <div key={g.id} style={{marginBottom:22}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
            fontSize:18,color:DA_YELLOW,marginBottom:9,letterSpacing:2}}>
            GRUPO {g.id}
          </div>
          {g.partidos.map(p=>{
            const cur=local[p.id]||resultados[p.id]||{local:"",visitante:""};
            const ok=!!(resultados[p.id]?.local!==undefined&&resultados[p.id]?.local!=="");
            return(
              <div key={p.id} style={{
                display:"flex",alignItems:"center",gap:8,
                background:DA_CARD,borderRadius:10,padding:"9px 12px",marginBottom:5,
                border:ok?`1px solid #00C89633`:`1px solid rgba(255,255,255,0.06)`}}>
                <span style={{flex:1,textAlign:"right",fontSize:12,color:"#fff"}}>
                  {FLAGS[p.local]||""} {p.local}
                </span>
                <NumInput value={cur.local} onChange={v=>setScore(p.id,"local",v)}/>
                <span style={{color:"rgba(255,255,255,0.2)"}}>—</span>
                <NumInput value={cur.visitante} onChange={v=>setScore(p.id,"visitante",v)}/>
                <span style={{flex:1,fontSize:12,color:"#fff"}}>
                  {FLAGS[p.visitante]||""} {p.visitante}
                </span>
                {ok&&<span style={{color:"#00C896",fontSize:12}}>✓</span>}
              </div>
            );
          })}
        </div>
      ))}

      <div style={{textAlign:"center",marginTop:10}}>
        <button onClick={guardar}
          style={{background:"#E53E3E",color:"#fff",border:"none",
            borderRadius:10,padding:"12px 30px",fontSize:14,fontWeight:700,
            cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",
            letterSpacing:2,textTransform:"uppercase"}}>
          Guardar todo
        </button>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function PencaApp(){
  const [usuario,setUsuario]=useState(null);
  const [empresa,setEmpresa]=useState("");
  const [tab,setTab]=useState("predicciones");
  const [resultados,setResultados]=useState({});
  const [campeonReal,setCampeonReal]=useState("");
  const [fasesEquipos,setFasesEquipos]=useState({});
  const [usuarios,setUsuarios]=useState([]);
  const [showAdmin,setShowAdmin]=useState(false);
  const [adminPass,setAdminPass]=useState("");
  const [adminOk,setAdminOk]=useState(false);
  const [tabKey,setTabKey]=useState(0);

  // Load shared data from Firebase on mount
  useEffect(()=>{
    (async()=>{
      // Load usuarios from Firebase
      const fbUsuarios = await fbGet("usuarios");
      if(fbUsuarios){
        const lista = Object.values(fbUsuarios);
        setUsuarios(lista);
      } else {
        setUsuarios([]);
      }
      // Load resultados
      const fbResultados = await fbGet("resultados");
      if(fbResultados){ setResultados(fbResultados); save("da_resultados",fbResultados); }
      // Load campeon
      const fbCampeon = await fbGet("campeon_real");
      if(fbCampeon){ setCampeonReal(fbCampeon); save("da_campeon_real",fbCampeon); }
      // Load fases
      const fbFases = await fbGet("fases_equipos");
      if(fbFases){ setFasesEquipos(fbFases); save("da_fases_equipos",fbFases); }
    })();
  }, []);

  const handleLogin=(n,e)=>{
    setUsuario(n); setEmpresa(e);
    const u=load("da_usuarios",[]);
    const key=`${n}||${e}`;
    if(!u.find(x=>x.key===key)){
      const nu=[...u,{key,nombre:n,empresa:e}];
      save("da_usuarios",nu); setUsuarios(nu);
    } else setUsuarios(u);
  };

  const css=`
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:${DA_BG};}
    input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none;}
    input[type=number]{-moz-appearance:textfield;}
    input:focus,select:focus{border-color:${DA_TEAL}!important;box-shadow:0 0 0 3px ${DA_TEAL}22;}
    select option{background:#2D3748;}
  `;

  if(!usuario) return(
    <><style>{css}</style><Login onLogin={handleLogin}/></>
  );

  const tabs=[
    {id:"predicciones",label:"⚽ Grupos"},
    {id:"eliminatorias",label:"🏅 Eliminatorias"},
    {id:"tabla",label:"🏆 Posiciones"},
    {id:"premios",label:"🎁 Premios"},
    {id:"admin",label:"🔒 Admin"},
  ];

  return(
    <>
      <style>{css}</style>
      <div style={{minHeight:"100vh",background:DA_BG,fontFamily:"'Inter',sans-serif"}}>

        {/* HEADER */}
        <div style={{background:"rgba(26,32,44,0.97)",backdropFilter:"blur(12px)",
          borderBottom:`2px solid ${DA_YELLOW}33`,position:"sticky",top:0,zIndex:50,padding:"0 16px"}}>
          <div style={{maxWidth:720,margin:"0 auto",display:"flex",
            alignItems:"center",gap:10,height:54}}>
            <img src={`data:image/png;base64,${LOGO_B64}`} alt="Da!" style={{height:36}}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                fontSize:18,color:"#fff",letterSpacing:2,textTransform:"uppercase",lineHeight:1}}>
                Penca Mundial
              </div>
              <div style={{fontSize:11,color:DA_TEXT_LIGHT,lineHeight:1.2}}>
                {usuario} · {empresa}
              </div>
            </div>
            <button onClick={()=>setUsuario(null)}
              style={{background:"none",border:`1px solid rgba(255,255,255,0.12)`,
                color:"rgba(255,255,255,0.4)",borderRadius:8,
                padding:"4px 10px",cursor:"pointer",fontSize:11}}>
              Cambiar ↩
            </button>
          </div>

          <div style={{maxWidth:720,margin:"0 auto",display:"flex",gap:2}}>
            {tabs.map(t=>(
              <button key={t.id}
                onClick={()=>{
                  if(t.id==="admin"&&!adminOk){setShowAdmin(true);}
                  else setTab(t.id);
                }}
                style={{background:tab===t.id?`${DA_YELLOW}18`:"none",border:"none",
                  borderBottom:tab===t.id?`2px solid ${DA_YELLOW}`:"2px solid transparent",
                  color:tab===t.id?DA_YELLOW:"rgba(255,255,255,0.38)",
                  padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:600,
                  transition:"all .2s"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>

        {/* MODAL ADMIN */}
        {showAdmin&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",
            display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
            <div style={{background:"#2D3748",border:"1px solid rgba(229,62,62,0.4)",
              borderRadius:18,padding:30,width:290,textAlign:"center"}}>
              <div style={{fontSize:30,marginBottom:10}}>🔒</div>
              <p style={{color:"#fff",fontWeight:700,marginBottom:14,fontSize:15}}>
                Contraseña de Admin
              </p>
              <input type="password" value={adminPass}
                onChange={e=>setAdminPass(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==="Enter"){
                    if(adminPass===ADMIN_PASS){setAdminOk(true);setTab("admin");setShowAdmin(false);setAdminPass("");}
                    else alert("Contraseña incorrecta");
                  }
                }}
                placeholder="Contraseña..."
                style={{width:"100%",background:"rgba(255,255,255,0.08)",
                  border:`1px solid rgba(255,255,255,0.15)`,borderRadius:8,
                  color:"#fff",padding:"9px 13px",fontSize:14,outline:"none",marginBottom:12}}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setShowAdmin(false);setAdminPass("");}}
                  style={{flex:1,background:"rgba(255,255,255,0.08)",border:"none",
                    color:"#fff",borderRadius:8,padding:9,cursor:"pointer"}}>
                  Cancelar
                </button>
                <button onClick={()=>{
                  if(adminPass===ADMIN_PASS){setAdminOk(true);setTab("admin");setShowAdmin(false);setAdminPass("");}
                  else alert("Contraseña incorrecta");
                }} style={{flex:1,background:"#E53E3E",border:"none",color:"#fff",
                  borderRadius:8,padding:9,cursor:"pointer",fontWeight:700}}>
                  Entrar
                </button>
              </div>
            </div>
          </div>
        )}

        {/* CONTENIDO */}
        <div style={{paddingTop:22}}>
          {tab==="predicciones"&&(
            <Predicciones usuario={usuario} empresa={empresa}
              resultados={resultados} campeonReal={campeonReal}
              onSave={()=>setTabKey(k=>k+1)}/>
          )}
          {tab==="tabla"&&(
            <Tabla key={tabKey} resultados={resultados} campeonReal={campeonReal}/>
          )}
          {tab==="eliminatorias"&&(
            <FasesEliminatorias usuario={usuario} resultados={resultados}
              fasesEquipos={fasesEquipos} onSave={()=>setTabKey(k=>k+1)}/>
          )}
          {tab==="premios"&&<Premios/>}
          {tab==="admin"&&adminOk&&(
            <div>
              <Admin resultados={resultados} campeonReal={campeonReal}
                onUpdate={setResultados} onCampeon={setCampeonReal}/>
              <AdminFases fasesEquipos={fasesEquipos} onUpdate={setFasesEquipos}/>
            </div>
          )}
        </div>
      </div>
    </>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<PencaApp />);
  </script>
</body>
</html>
